services:
  db:
    image: postgres:16
    container_name: idc-db
    environment:
      POSTGRES_USER: idc
      POSTGRES_PASSWORD: idc
      POSTGRES_DB: idc
    ports:
      - "5432:5432"
    volumes:
      - idc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idc"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  idc_pgdata:
